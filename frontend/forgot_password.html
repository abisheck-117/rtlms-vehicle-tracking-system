<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Tracking System</title>
    <!-- Modern crisp typography -->
    <link href="https://fonts.googleapis.com/css2?family=Euclid+Circular+A:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=1.1">
</head>
<body class="split-auth-body">

    <div class="login-split-card">
        
        <div class="login-image-panel">
            <div class="login-image-wrapper"></div>
        </div>

        <div class="login-form-panel">
            <div class="form-header">
                <div class="logo-badge">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                </div>
                <h1 class="college-title">RTLMS Telemetry</h1>
            </div>

            <h2 class="auth-form-title">Reset Password</h2>
            <p class="auth-form-subtitle">Enter your registered phone number to receive an OTP.</p>
            
            <div id="errorMsg" class="hidden"></div>
            <div id="successMsg" class="hidden"></div>
            
            <!-- Step 1: Request OTP -->
            <form id="phoneForm">
                <div class="custom-form-group">
                    <label class="custom-label">Phone Number (with code)</label>
                    <input type="text" id="phoneNumber" class="custom-input" placeholder="+1234567890" required>
                </div>
                <div id="recaptcha-container"></div>
                <button type="submit" class="custom-btn" id="requestOtpBtn">Send Secure OTP</button>
            </form>

            <!-- Step 2: Verify & Reset -->
            <form id="resetForm" class="hidden">
                <div class="custom-form-group">
                    <label class="custom-label">SMS Verification Code</label>
                    <input type="text" id="otpCode" class="custom-input" placeholder="6-digit code" required>
                </div>
                <div class="custom-form-group">
                    <label class="custom-label">New Password</label>
                    <input type="password" id="newPassword" class="custom-input" placeholder="Create new password" required>
                </div>
                <button type="submit" class="custom-btn" id="confirmResetBtn">Confirm Password Reset</button>
            </form>
            
            <div class="auth-form-footer">
                <div>
                    <a href="login.html" class="link-text" style="color: #64748b;">← Back to Sign In</a>
                </div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script type="module" src="js/forgot_password.js"></script>
</body>
</html>
