<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Setup - Tracking System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Complete Setup</h2>
            <p class="subtitle">Complete your account registration with OTP</p>

            <div id="errorMsg" class="text-danger text-center mb-4 hidden"></div>

            <!-- Step 1: Request OTP -->
            <form id="phoneForm">
                <div class="form-group">
                    <label>Phone Number (with country code)</label>
                    <input type="text" id="phoneNumber" class="form-control" placeholder="+1234567890" required>
                </div>
                <!-- Invisible Recaptcha container -->
                <div id="recaptcha-container"></div>

                <button type="submit" class="btn btn-primary" id="requestOtpBtn">Request OTP</button>
            </form>

            <!-- Step 2: Verify & Setup -->
            <form id="setupForm" class="hidden">
                <div class="form-group">
                    <label>SMS OTP Code</label>
                    <input type="text" id="otpCode" class="form-control" required>
                </div>
                
                <hr style="margin: 20px 0; border: 1px solid #eee;">
                
                <!-- Email verification section -->
                <div class="form-group">
                    <label>Email Address</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="email" id="email" class="form-control" style="flex: 1;" required>
                        <div class="btn btn-sm btn-outline" id="requestEmailOtpBtn" style="white-space: nowrap; cursor: pointer; display: flex; align-items: center;">Send OTP</div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email OTP Code</label>
                    <input type="text" id="emailOtpCode" class="form-control" required>
                </div>
                
                <hr style="margin: 20px 0; border: 1px solid #eee;">

                <div class="form-group">
                    <label>New Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success mt-2" id="completeSetupBtn">Verify & Create
                    Account</button>
            </form>

            <div class="text-center mt-4">
                <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.875rem;">←
                    Back to Login</a>
            </div>
        </div>
    </div>

    <!-- Firebase SDK attached via module -->
    <script type="module" src="js/setup_auth.js"></script>
    <script src="js/api.js"></script>
</body>

</html>
