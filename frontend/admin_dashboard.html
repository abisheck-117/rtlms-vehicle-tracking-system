<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Tracking System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
</head>

<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>V-Track Portal</h3>
                <span class="badge badge-danger mt-2">ADMIN MODE</span>
            </div>
            <nav class="sidebar-nav" id="sidebarNav">
                <a class="nav-item active" data-tab="tab-map">Global Map</a>
                <a class="nav-item" data-tab="tab-users">User Management</a>
                <a class="nav-item" data-tab="tab-vehicles">Vehicle Overview</a>
            </nav>
            <div class="sidebar-header border-t">
                <button class="btn btn-sm btn-danger" onclick="logout()">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h2>Admin Dashboard</h2>
                <div id="userInfo" class="text-muted">Loading...</div>
            </header>

            <div class="content-area">

                <!-- Tab: Global Map -->
                <div id="tab-map" class="tab-content">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Live Global Tracking</h3>
                        </div>
                        <div class="card-body p-0">
                            <div id="adminMap" class="map-container" style="height: 600px; border-radius: 0 0 8px 8px;">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab: User Management -->
                <div id="tab-users" class="tab-content hidden">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">User Management</h3>
                            <button class="btn btn-sm btn-primary" onclick="openInviteModal()">+ Invite User</button>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Username</th>
                                            <th>Email</th>
                                            <th>Phone Number</th>
                                            <th>Role</th>
                                            <th>Status</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="usersTableBody">
                                        <!-- populated dynamically -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab: Vehicles Overview -->
                <div id="tab-vehicles" class="tab-content hidden">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Global Vehicles</h3>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Name</th>
                                            <th>Owner</th>
                                            <th>Device Key</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="globalVehiclesTableBody">
                                        <!-- populated dynamically -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="inviteUserModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Invite New User</h3>
                <button class="btn btn-sm" onclick="closeModal('inviteUserModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="inviteEmail" class="form-control" placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label>Phone Number (with country code, e.g., +1234567890)</label>
                    <input type="text" id="invitePhone" class="form-control" placeholder="+1234567890">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-sm" onclick="closeModal('inviteUserModal')">Cancel</button>
                <button class="btn btn-sm btn-primary" onclick="submitInviteUser()">Send Invite Link</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script type="module" src="js/firebase-config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/dashboard_admin.js" type="module"></script>

    <script>
        document.querySelectorAll('.nav-item').forEach(el => {
            if (el.dataset.tab) {
                el.addEventListener('click', () => {
                    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(tc => tc.classList.add('hidden'));

                    el.classList.add('active');
                    document.getElementById(el.dataset.tab).classList.remove('hidden');
                    if (typeof invalidateAdminMap === 'function') invalidateAdminMap();
                });
            }
        });

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
