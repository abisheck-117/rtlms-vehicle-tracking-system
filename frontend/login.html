<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking System - Login</title>
    <!-- Modern crisp typography -->
    <link href="https://fonts.googleapis.com/css2?family=Euclid+Circular+A:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=1.1">
</head>
<body class="split-auth-body">

    <div class="login-split-card">
        
        <!-- Left Side: Edge to edge image -->
        <div class="login-image-panel">
            <div class="login-image-wrapper"></div>
        </div>

        <!-- Right Side: Form cleanly aligned left -->
        <div class="login-form-panel">
            <div class="form-header">
                <div class="logo-badge">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                        <polyline points="2 17 12 22 22 17"></polyline>
                        <polyline points="2 12 12 17 22 12"></polyline>
                    </svg>
                </div>
                <h1 class="college-title">RTLMS Telemetry</h1>
            </div>

            <h2 class="auth-form-title">Sign In</h2>
            <p class="auth-form-subtitle">The key to the dashboard is to sign in.</p>
            
            <div id="errorMsg" class="hidden"></div>
            
            <form id="loginForm">
                <div class="custom-form-group">
                    <label class="custom-label">Username</label>
                    <input type="text" id="username" class="custom-input" placeholder="Enter your username" required>
                </div>
                
                <div class="custom-form-group">
                    <label class="custom-label">Password</label>
                    <input type="password" id="password" class="custom-input" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="custom-btn" id="loginBtn">Access Dashboard</button>
            </form>
            
            <div class="auth-form-footer">
                <div>
                    Invited by Admin? <a href="complete_setup.html" class="link-text">Complete Setup</a>
                </div>
                <div>
                    <a href="forgot_password.html" class="link-text" style="color: #64748b;">Forgot Password?</a>
                </div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.textContent = 'Verifying...';
            btn.disabled = true;
            
            try {
                const res = await apiLogin(
                    document.getElementById('username').value,
                    document.getElementById('password').value
                );
                
                // Redirect based on role by tapping an admin API endpoint
                try {
                    await apiFetch('/api/admin/users/');
                    window.location.href = 'admin_dashboard.html';
                } catch (roleErr) {
                    window.location.href = 'user_dashboard.html';
                }
            } catch (err) {
                const errDiv = document.getElementById('errorMsg');
                errDiv.textContent = err.message || 'Authentication failed. Please check your credentials.';
                errDiv.classList.remove('hidden');
                btn.textContent = 'Access Dashboard';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
